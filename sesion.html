<!DOCTYPE html>
<html>
<head>
  <title>Login Firebase</title>
</head>
<link rel="stylesheet" href="estilosreg.css">
<body>

<h2>Login</h2>

<input type="email" id="email" placeholder="Correo"><br><br>
<input type="password" id="password" placeholder="Contraseña"><br><br>

<button onclick="login()">Iniciar sesión</button>
<button onclick="register()">Registrarse</button>

<script type="module">

// 🔥 IMPORTAR FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

// 🔥 TU CONFIG (PEGAR AQUÍ)
const firebaseConfig = {
   apiKey: "AIzaSyBDAOW-qrvxTcJVM4QNWPQvrmbz8wcAQLM",
    authDomain: "trujillo-digital-hub.firebaseapp.com",
    projectId: "trujillo-digital-hub",
    storageBucket: "trujillo-digital-hub.firebasestorage.app",
    messagingSenderId: "162799375782",
    appId: "1:162799375782:web:2be9127bfeaa613fd6ab67"
};

// Inicializar
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 REGISTRO
window.register = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Usuario creado ✅");
  } catch (error) {
    alert(error.message);
  }
}

// 🔐 LOGIN
window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    alert("Bienvenido 🔥");
    window.location.href = "panel.html";
  } catch (error) {
    alert("Error: " + error.message);
  }
}

</script>

</body>
</html>
